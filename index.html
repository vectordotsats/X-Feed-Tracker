<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMON — Crypto Feed Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAV -->
    <header class="topbar">
        <div class="logo">X<span>MON</span><small class="version">v2</small></div>
        <nav class="nav-tabs">
            <button class="nav-btn active" data-view="chat">◈ ANALYST</button>
            <button class="nav-btn" data-view="feed">◇ FEED <span id="feed-count">(0)</span></button>
        </nav>
    </header>

    <!-- KEYWORD BAR -->
    <div class="kw-bar">
        <span class="kw-label">TRACKING:</span>
        <div class="kw-chips" id="kw-chips"></div>
        <input class="kw-input" id="kw-input" placeholder="+ add" />
    </div>

    <!-- CHAT VIEW -->
    <main class="view active" id="view-chat">
        <div class="chat-header">
            <span class="chat-title">XMON AGENT</span>
            <button class="clear-btn" id="clear-chat">CLEAR</button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">⚡</div>
                <div class="welcome-title">gm. XMON is online.</div>
                <div class="welcome-text">
                    Paste tweets in the <strong>FEED</strong> tab, then ask me to analyze them.
                    Or just ask me anything about Reservoir narratives.
                </div>
                <div class="welcome-examples">
                    <button class="example-chip" data-prompt="What's the current sentiment around wsrUSD?">"Sentiment on
                        wsrUSD?"</button>
                    <button class="example-chip" data-prompt="Draft an intern reply to a bullish rUSD tweet">"Draft
                        intern reply"</button>
                    <button class="example-chip"
                        data-prompt="Summarize the Reservoir narrative this week based on my feed">"Weekly narrative
                        summary"</button>
                </div>
            </div>
        </div>
        <div class="input-area">
            <textarea class="chat-input" id="chat-input"
                placeholder="Ask about your feed, draft replies, analyze narratives..." rows="1"></textarea>
            <button class="send-btn" id="send-btn">→</button>
        </div>
        <div class="hint">Ctrl+Enter to send · Click examples above to start</div>
    </main>

    <!-- FEED VIEW -->
    <main class="view" id="view-feed">
        <div class="feed-input-area">
            <textarea class="feed-input" id="feed-input" placeholder="Paste a tweet or thread here..."
                rows="3"></textarea>
            <button class="add-btn" id="add-tweet">+ ADD</button>
        </div>
        <div class="feed-list" id="feed-list">
            <div class="empty-feed" id="empty-feed">
                <div style="font-size:28px;margin-bottom:12px">📋</div>
                <div>No tweets saved yet. Paste tweets above to start tracking.</div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
